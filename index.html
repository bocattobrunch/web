<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bocatto Brunch | Veracruz</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f9f8f6; --accent: #1b2a8d; --dark: #3b2f2f; --white: #ffffff; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--dark); margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--dark); }
        .tagline { color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; }
        .btn { display: inline-block; background: var(--dark); color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: 700; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: var(--accent); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .item { padding: 15px; border: 1px solid #eee; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <p class="tagline">Solo para llevar o domicilio</p>
            <h1>Bocatto Brunch</h1>
            <p>Tu desayuno favorito, directo a donde estés en Veracruz y Boca del Río.</p>
            <a href="https://wa.me/522295190082" class="btn">Hacer Pedido vía WhatsApp</a>
        </header>
        
        <div class="menu-grid">
            <div class="item"><h3>Cuernito Omelette</h3><p>Clásico salado con jamón y queso.</p></div>
            <div class="item"><h3>Hot Cakes Nutella</h3><p>El favorito dulce de la casa.</p></div>
        </div>

        <footer style="margin-top: 40px; font-size: 0.8rem; color: #888;">
            © 2026 Bocatto Brunch | Diseñado por harbor48
        </footer>
    </div>
</body>
</html>
